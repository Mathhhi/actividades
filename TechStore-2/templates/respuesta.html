<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto Registrado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

<div class="container mt-5">
    {% if exito %}
    <div class="alert alert-success shadow-sm">
        <h2 class="mb-0 fs-4">
            <i class="bi bi-check-circle-fill me-2"></i> {{ mensaje }}
        </h2>
    </div>
    {% else %}
    <div class="alert alert-danger shadow-sm">
        <h2 class="mb-0 fs-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Hubo un problema
        </h2>
        <p class="mt-2 mb-0">{{ mensaje }}</p>
    </div>
    {% endif %}

    <div class="card shadow mt-4">
        <div class="card-body">
            <h4 class="card-title mb-4 border-bottom pb-2">Información del Producto</h4>

            <p><strong>Código:</strong> <span class="badge bg-secondary">{{ codigo }}</span></p>
            <p><strong>Nombre:</strong> {{ nombre }}</p>
            <p><strong>Precio:</strong> {{ precio }}</p>
            <p><strong>Categoría:</strong> {{ categoria }}</p>

            <div class="mt-4 pt-3 border-top d-flex gap-2">
                <a href="/productos" class="btn btn-primary">Ver Lista de Productos</a>
                <a href="/registro_producto" class="btn btn-outline-secondary">Registrar Otro Producto</a>
            </div>
        </div>
    </div>

</div>
</body>

</html>
